---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: tetris
    namespace: tetris
spec:
    replicas: 2
    selector:
        matchLabels:
            app: tetris
    template:
        metadata:
            labels:
                app: tetris
        spec:
            containers:
                - name: tetris
                  image: tanattanat/tetris-v2:34
                  ports:
                      - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
    name: tetris-service
    namespace: tetris
spec:
    selector:
        app: tetris
    ports:
        - protocol: TCP
          port: 80
          targetPort: 3000
    type: LoadBalancer
